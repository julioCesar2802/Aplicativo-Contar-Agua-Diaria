<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroTrack - Water Tracker 💧</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        <header class="tracker-header">
            <h1>HydroTrack 💧</h1>
            <div class="progress-circle">
                <span id="totalDisplay">0</span>
                <small>ml</small>
            </div>
            <p>Daily goal: <span id="goalDisplay">2500</span>ml</p>
        </header>

        <section class="controls">
            <button onclick="addWater(250)" class="btn-water small">
                🥤 250ml
            </button>
            <button onclick="addWater(500)" class="btn-water medium">
                🍶 500ml
            </button>
            <button onclick="openCustomModal()" class="btn-custom">
                ➕ Custom
            </button>
        </section>

        <hr>

        <section class="history-section">
            <h3>Today's History</h3>
            <div id="historyList" class="list-container">
            </div>
        </section>
    </main>

    <div id="editorModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modalTitle">Add Water</h3>
            <input type="number" id="inputAmount" placeholder="Amount in ml" step="50">
            <input type="hidden" id="editId">
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn-cancel">Cancel</button>
                <button onclick="saveCustom()" class="btn-confirm">Save</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
